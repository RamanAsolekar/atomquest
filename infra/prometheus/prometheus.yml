global:
  scrape_interval: 10s
  evaluation_interval: 10s
  external_labels:
    cluster: atom-support-vision

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: atom-backend
    metrics_path: /metrics
    static_configs:
      - targets: ['backend:4000']
        labels: { service: backend }

  - job_name: atom-media
    metrics_path: /metrics
    static_configs:
      - targets: ['media:5000']
        labels: { service: media }
