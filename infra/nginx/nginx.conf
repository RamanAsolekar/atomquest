worker_processes auto;
events { worker_connections 4096; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile on;
  keepalive_timeout 65;
  client_max_body_size 30m;  # allow file-share uploads (25m + headroom)

  # WebSocket upgrade map
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  # Docker's embedded DNS. Using a resolver + variables in proxy_pass forces
  # nginx to re-resolve the service name PER REQUEST instead of caching the
  # container IP at startup. Without this, recreating backend/media/web (e.g. a
  # rebuild) gives them new IPs and nginx keeps hitting the dead old ones →
  # 502 Bad Gateway until nginx is restarted. This makes rebuilds self-healing.
  resolver 127.0.0.11 valid=10s ipv6=off;
  # Upstream targets as variables (so proxy_pass triggers runtime DNS).
  map "" $upstream_web      { default "web:3000"; }
  map "" $upstream_backend  { default "backend:4000"; }
  map "" $upstream_media    { default "media:5000"; }
  map "" $upstream_grafana  { default "grafana:3000"; }

  # gzip
  gzip on;
  gzip_types text/plain application/json application/javascript text/css image/svg+xml;
  gzip_min_length 1024;

  server {
    listen 80;
    server_name _;

    # Server-Sent Events (live dashboards / transcript). Buffering MUST be off or
    # events are held back; long read timeout keeps the stream open.
    location /api/stream/ {
      proxy_pass http://$upstream_backend$request_uri;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection '';
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 86400s;
      chunked_transfer_encoding off;
    }

    # API (REST)
    location /api/ {
      proxy_pass http://$upstream_backend$request_uri;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      # So the backend can build shareable invite links that match the host the
      # agent actually opened (Google-Meet-style "link just works").
      proxy_set_header X-Forwarded-Host $host;
    }

    # Backend realtime socket.io (chat/presence)
    location /socket.io/ {
      proxy_pass http://$upstream_backend$request_uri;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_read_timeout 86400s;
    }

    # Media SFU signaling (Zoom-style same-origin). socket.io-client uses its
    # `path` option ('/rtc/') as the COMPLETE engine endpoint — it does NOT
    # append 'socket.io/'. So the browser requests /rtc/?EIO=4&... directly.
    # We rewrite the whole /rtc/ engine path to the media server's default
    # /socket.io/ path, preserving the query string. The /sfu *namespace* rides
    # inside the handshake, not the URL.
    location /rtc/ {
      rewrite ^/rtc/(.*)$ /socket.io/$1 break;
      # With a variable upstream, proxy_pass does NOT auto-append the URI, so we
      # pass the rewritten $uri + query explicitly.
      proxy_pass http://$upstream_media$uri$is_args$args;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 86400s;
    }

    # Grafana (optional, behind /grafana)
    location /grafana/ {
      proxy_pass http://$upstream_grafana$request_uri;
      proxy_set_header Host $host;
    }

    # Next.js app (catch-all)
    location / {
      proxy_pass http://$upstream_web$request_uri;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
