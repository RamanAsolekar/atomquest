worker_processes auto;
events { worker_connections 4096; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile on;
  keepalive_timeout 65;
  client_max_body_size 30m;  # allow file-share uploads (25m + headroom)

  # WebSocket upgrade map
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  upstream web      { server web:3000; }
  upstream backend  { server backend:4000; }
  upstream media    { server media:5000; }
  upstream grafana  { server grafana:3000; }

  # gzip
  gzip on;
  gzip_types text/plain application/json application/javascript text/css image/svg+xml;
  gzip_min_length 1024;

  server {
    listen 80;
    server_name _;

    # API (REST + socket.io /rt namespace)
    location /api/ {
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend realtime socket.io (chat/presence)
    location /socket.io/ {
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_read_timeout 86400s;
    }

    # Media-server signaling socket.io (SFU)
    location /sfu/ {
      proxy_pass http://media;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_read_timeout 86400s;
    }

    # Grafana (optional, behind /grafana)
    location /grafana/ {
      proxy_pass http://grafana/;
      proxy_set_header Host $host;
    }

    # Next.js app (catch-all)
    location / {
      proxy_pass http://web;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
