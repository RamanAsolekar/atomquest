name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12', cache: pip }
      - run: pip install -r requirements.txt && pip install pytest pytest-asyncio aiosqlite ruff
      - name: Lint (ruff)
        run: ruff check app || true
      - name: Unit tests (pytest)
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm install
      - name: Build shared package
        run: npm -w @atom/shared run build
      - name: Typecheck web
        run: npm -w @atom/web exec tsc --noEmit || true
      - name: Media unit tests
        run: npm -w @atom/media run test || true

  build-images:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    strategy:
      matrix:
        service: [backend, media, web]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          push: false
          tags: atom-${{ matrix.service }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  e2e:
    runs-on: ubuntu-latest
    needs: [build-images]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: cp .env.example .env
      - name: Start stack
        run: docker compose up -d --build backend media web postgres redis minio
      - name: Wait for backend health
        run: |
          for i in $(seq 1 40); do
            if curl -fsS http://localhost:4000/health; then echo ok; break; fi
            sleep 3
          done
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - name: Run Playwright e2e
        run: npm run test:e2e || true
      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --no-color | tail -300
      - name: Tear down
        if: always()
        run: docker compose down -v
