apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: atom
resources:
  - ../../base

# Prod: pin image tags to a release, scale up, larger Whisper model.
images:
  - name: ghcr.io/atom/atom-backend
    newTag: v1.0.0
  - name: ghcr.io/atom/atom-web
    newTag: v1.0.0
  - name: ghcr.io/atom/atom-media
    newTag: v1.0.0

patches:
  - target: { kind: Deployment, name: backend }
    patch: |
      - { op: replace, path: /spec/replicas, value: 3 }
  - target: { kind: StatefulSet, name: media }
    patch: |
      - { op: replace, path: /spec/replicas, value: 3 }

configMapGenerator:
  - name: atom-config
    behavior: merge
    literals:
      - ENV=production
      - WHISPER_MODEL=small.en

# In prod, drop the in-cluster datastores and point at managed services instead:
#   patchesStrategicMerge to delete datastores.yaml resources, then set
#   DATABASE_URL / REDIS_URL / S3_* in atom-secrets to RDS / ElastiCache / S3.
