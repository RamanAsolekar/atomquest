# Non-secret config shared by services. Secrets live in the (separately managed)
# `atom-secrets` Secret — do NOT commit real secrets; this is a template.
apiVersion: v1
kind: ConfigMap
metadata:
  name: atom-config
  namespace: atom
data:
  ENV: "production"
  API_PORT: "4000"
  CORS_ORIGIN: "https://atom.example.com"
  WEB_URL: "https://atom.example.com"
  REDIS_URL: "redis://redis:6379"
  S3_ENDPOINT: "http://minio:9000"
  S3_PUBLIC_ENDPOINT: "https://s3.atom.example.com"
  S3_BUCKET_RECORDINGS: "atom-recordings"
  S3_BUCKET_FILES: "atom-files"
  MEDIA_INTERNAL_URL: "http://media:5000"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
  AI_ASSISTANT_ENABLED: "true"
  STT_ENABLED: "true"
  WHISPER_MODEL: "base.en"
  WHISPER_DEVICE: "cpu"
  WHISPER_COMPUTE_TYPE: "int8"
  MEDIASOUP_MIN_PORT: "40000"
  MEDIASOUP_MAX_PORT: "40100"
  MEDIA_NUM_WORKERS: "2"
---
# Template Secret — replace values via your secrets manager / sealed-secrets / SOPS.
apiVersion: v1
kind: Secret
metadata:
  name: atom-secrets
  namespace: atom
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://atom:atom_dev_password@postgres:5432/atom_support"
  JWT_ACCESS_SECRET: "CHANGE_ME_openssl_rand_hex_64"
  JWT_REFRESH_SECRET: "CHANGE_ME_openssl_rand_hex_64"
  INVITE_TOKEN_SECRET: "CHANGE_ME_openssl_rand_hex_64"
  COOKIE_SECRET: "CHANGE_ME"
  S3_ACCESS_KEY: "atom_minio"
  S3_SECRET_KEY: "atom_minio_secret"
  POSTGRES_USER: "atom"
  POSTGRES_PASSWORD: "atom_dev_password"
  POSTGRES_DB: "atom_support"
  ANTHROPIC_API_KEY: ""
