# Prometheus + Grafana for the cluster. Prometheus scrapes pods annotated with
# prometheus.io/scrape (backend + media). For production prefer the kube-prometheus
# stack / an operator; this is a minimal self-contained setup.
apiVersion: v1
kind: ConfigMap
metadata: { name: prometheus-config, namespace: atom }
data:
  prometheus.yml: |
    global: { scrape_interval: 10s }
    scrape_configs:
      - job_name: atom-backend
        kubernetes_sd_configs: [{ role: pod, namespaces: { names: [atom] } }]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port]
            target_label: __address__
            regex: (.+)
            replacement: ${1}
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: prometheus, namespace: atom }
spec:
  replicas: 1
  selector: { matchLabels: { app: prometheus } }
  template:
    metadata: { labels: { app: prometheus } }
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          args: ["--config.file=/etc/prometheus/prometheus.yml"]
          ports: [{ containerPort: 9090 }]
          volumeMounts: [{ name: cfg, mountPath: /etc/prometheus }]
      volumes: [{ name: cfg, configMap: { name: prometheus-config } }]
---
apiVersion: v1
kind: ServiceAccount
metadata: { name: prometheus, namespace: atom }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata: { name: atom-prometheus }
rules:
  - apiGroups: [""]
    resources: [pods, services, endpoints, nodes]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata: { name: atom-prometheus }
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: ClusterRole, name: atom-prometheus }
subjects: [{ kind: ServiceAccount, name: prometheus, namespace: atom }]
---
apiVersion: v1
kind: Service
metadata: { name: prometheus, namespace: atom }
spec:
  selector: { app: prometheus }
  ports: [{ port: 9090, targetPort: 9090 }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: grafana, namespace: atom }
spec:
  replicas: 1
  selector: { matchLabels: { app: grafana } }
  template:
    metadata: { labels: { app: grafana } }
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          env: [{ name: GF_SECURITY_ADMIN_PASSWORD, value: admin }]
          ports: [{ containerPort: 3000 }]
---
apiVersion: v1
kind: Service
metadata: { name: grafana, namespace: atom }
spec:
  selector: { app: grafana }
  ports: [{ port: 3000, targetPort: 3000 }]
