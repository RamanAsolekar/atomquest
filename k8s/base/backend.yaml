apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: atom
  labels: { app: backend }
spec:
  replicas: 2
  selector: { matchLabels: { app: backend } }
  template:
    metadata:
      labels: { app: backend }
      annotations: { prometheus.io/scrape: "true", prometheus.io/port: "4000", prometheus.io/path: "/metrics" }
    spec:
      # Run DB migrations once before the app starts (idempotent across replicas).
      initContainers:
        - name: migrate
          image: ghcr.io/atom/atom-backend:latest
          command: ["sh", "-c", "alembic upgrade head"]
          envFrom: [{ configMapRef: { name: atom-config } }, { secretRef: { name: atom-secrets } }]
      containers:
        - name: backend
          image: ghcr.io/atom/atom-backend:latest
          command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "4000", "--proxy-headers", "--workers", "2"]
          envFrom: [{ configMapRef: { name: atom-config } }, { secretRef: { name: atom-secrets } }]
          ports: [{ containerPort: 4000 }]
          readinessProbe: { httpGet: { path: /health/ready, port: 4000 }, initialDelaySeconds: 10, periodSeconds: 10 }
          livenessProbe: { httpGet: { path: /health, port: 4000 }, initialDelaySeconds: 15, periodSeconds: 15 }
          resources: { requests: { cpu: 200m, memory: 256Mi }, limits: { cpu: "1", memory: 512Mi } }
---
apiVersion: v1
kind: Service
metadata: { name: backend, namespace: atom }
spec:
  selector: { app: backend }
  # sticky sessions for SSE/socket.io affinity (Redis adapter also keeps replicas in sync)
  sessionAffinity: ClientIP
  ports: [{ port: 4000, targetPort: 4000 }]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: backend, namespace: atom }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: backend }
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
