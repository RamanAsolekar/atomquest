# =============================================================================
# Atom Support Vision — full stack. `docker compose up -d --build`
# Reads variables from .env (copy from .env.example).
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-atom}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-atom_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-atom_support}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-atom}']
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - '5432:5432'

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - '6379:6379'

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-atom_minio}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-atom_minio_secret}
    volumes:
      - miniodata:/data
    ports:
      - '9000:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: { context: ., dockerfile: apps/backend/Dockerfile }
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_started }
    environment:
      ENV: production
      API_PORT: 4000
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-atom}:${POSTGRES_PASSWORD:-atom_dev_password}@postgres:5432/${POSTGRES_DB:-atom_support}
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000,http://localhost}
      WEB_URL: ${WEB_URL:-http://localhost:3000}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev_access_secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev_refresh_secret}
      INVITE_TOKEN_SECRET: ${INVITE_TOKEN_SECRET:-dev_invite_secret}
      COOKIE_SECRET: ${COOKIE_SECRET:-dev_cookie_secret}
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-http://localhost:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-atom_minio}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-atom_minio_secret}
      MEDIA_INTERNAL_URL: http://media:5000
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AI_ASSISTANT_ENABLED: ${AI_ASSISTANT_ENABLED:-true}
    ports:
      - '4000:4000'

  media:
    build: { context: ., dockerfile: apps/media/Dockerfile }
    restart: unless-stopped
    # host networking is the simplest way to expose the dynamic RTC UDP/TCP
    # range; on Linux it is recommended. On Docker Desktop the published ports
    # below are used instead (set network_mode: "" and uncomment ports).
    depends_on:
      minio: { condition: service_started }
    environment:
      NODE_ENV: production
      MEDIA_PORT: 5000
      MEDIA_ANNOUNCED_IP: ${MEDIA_ANNOUNCED_IP:-127.0.0.1}
      MEDIASOUP_MIN_PORT: ${MEDIASOUP_MIN_PORT:-40000}
      MEDIASOUP_MAX_PORT: ${MEDIASOUP_MAX_PORT:-40100}
      MEDIA_NUM_WORKERS: ${MEDIA_NUM_WORKERS:-2}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev_access_secret}
      API_INTERNAL_URL: http://backend:4000
      RECORDING_ENABLED: ${RECORDING_ENABLED:-true}
      STT_ENABLED: ${STT_ENABLED:-true}
      WHISPER_MODEL: ${WHISPER_MODEL:-base.en}
      WHISPER_DEVICE: ${WHISPER_DEVICE:-cpu}
      WHISPER_COMPUTE_TYPE: ${WHISPER_COMPUTE_TYPE:-int8}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-atom_minio}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-atom_minio_secret}
      S3_BUCKET_RECORDINGS: ${S3_BUCKET_RECORDINGS:-atom-recordings}
    ports:
      - '5000:5000'
      - '40000-40100:40000-40100/udp'
      - '40000-40100:40000-40100/tcp'

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-http://localhost:4000}
        NEXT_PUBLIC_MEDIA_WS_URL: ${NEXT_PUBLIC_MEDIA_WS_URL:-http://localhost:5000}
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      # Next.js standalone reads HOSTNAME to decide what interface to bind to.
      # Docker sets HOSTNAME to the container ID → resolves to the container
      # network IP only, so healthcheck curl http://localhost:3000 fails.
      # 0.0.0.0 makes it listen on all interfaces including loopback.
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
    ports:
      - '3000:3000'

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - web
      - backend
      - media
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - '80:80'

  # ---- Observability ----
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    ports:
      - '${PROMETHEUS_PORT:-9090}:9090'

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - grafanadata:/var/lib/grafana
    ports:
      - '${GRAFANA_PORT:-3001}:3000'

  loki:
    image: grafana/loki:3.2.0
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./infra/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - lokidata:/loki
    ports:
      - '${LOKI_PORT:-3100}:3100'

  promtail:
    image: grafana/promtail:3.2.0
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./infra/loki/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    restart: unless-stopped
    command: ['--config=/etc/otel/config.yml']
    volumes:
      - ./infra/otel/otel-collector-config.yml:/etc/otel/config.yml:ro
    ports:
      - '4318:4318'
      - '4317:4317'

volumes:
  pgdata:
  redisdata:
  miniodata:
  promdata:
  grafanadata:
  lokidata:
