# =============================================================================
# Atom Support Vision — full stack. `docker compose up -d --build`
# Reads variables from .env (copy from .env.example).
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-atom}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-atom_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-atom_support}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-atom}']
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - '5432:5432'

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - '6379:6379'

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-atom_minio}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-atom_minio_secret}
    volumes:
      - miniodata:/data
    ports:
      - '9000:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: { context: ., dockerfile: apps/backend/Dockerfile }
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_started }
    environment:
      ENV: production
      API_PORT: 4000
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-atom}:${POSTGRES_PASSWORD:-atom_dev_password}@postgres:5432/${POSTGRES_DB:-atom_support}
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000,http://localhost}
      WEB_URL: ${WEB_URL:-http://localhost:3000}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev_access_secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev_refresh_secret}
      INVITE_TOKEN_SECRET: ${INVITE_TOKEN_SECRET:-dev_invite_secret}
      COOKIE_SECRET: ${COOKIE_SECRET:-dev_cookie_secret}
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-http://localhost:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-atom_minio}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-atom_minio_secret}
      MEDIA_INTERNAL_URL: http://media:5000
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AI_ASSISTANT_ENABLED: ${AI_ASSISTANT_ENABLED:-true}
    ports:
      - '4000:4000'

  media:
    build: { context: ., dockerfile: apps/media/Dockerfile }
    restart: unless-stopped
    # host networking is the simplest way to expose the dynamic RTC UDP/TCP
    # range; on Linux it is recommended. On Docker Desktop the published ports
    # below are used instead (set network_mode: "" and uncomment ports).
    depends_on:
      minio: { condition: service_started }
    environment:
      NODE_ENV: production
      MEDIA_PORT: 5000
      # The address the SFU announces to browsers. Empty → the media server
      # auto-detects the host LAN IP (works on one network) and warns. For
      # internet joins set MEDIA_ANNOUNCED_IP to the server's PUBLIC IP.
      MEDIA_ANNOUNCED_IP: ${MEDIA_ANNOUNCED_IP:-}
      PUBLIC_HOST: ${PUBLIC_HOST:-}
      # STUN/TURN handed to browsers for NAT traversal. STUN covers most home
      # routers; the bundled coturn (TURN_URL) relays media for symmetric NAT /
      # strict firewalls — required for reliable internet joins.
      STUN_URL: ${STUN_URL:-stun:stun.l.google.com:19302}
      TURN_URL: ${TURN_URL:-}
      TURN_USER: ${TURN_USER:-atom}
      TURN_PASS: ${TURN_PASS:-atom_turn_secret}
      MEDIASOUP_MIN_PORT: ${MEDIASOUP_MIN_PORT:-40000}
      MEDIASOUP_MAX_PORT: ${MEDIASOUP_MAX_PORT:-40100}
      MEDIA_NUM_WORKERS: ${MEDIA_NUM_WORKERS:-2}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev_access_secret}
      API_INTERNAL_URL: http://backend:4000
      RECORDING_ENABLED: ${RECORDING_ENABLED:-true}
      STT_ENABLED: ${STT_ENABLED:-true}
      WHISPER_MODEL: ${WHISPER_MODEL:-base.en}
      WHISPER_DEVICE: ${WHISPER_DEVICE:-cpu}
      WHISPER_COMPUTE_TYPE: ${WHISPER_COMPUTE_TYPE:-int8}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-atom_minio}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-atom_minio_secret}
      S3_BUCKET_RECORDINGS: ${S3_BUCKET_RECORDINGS:-atom-recordings}
    ports:
      - '5000:5000'
      - '40000-40100:40000-40100/udp'
      - '40000-40100:40000-40100/tcp'

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # IMPORTANT: NEXT_PUBLIC_* are inlined into the BROWSER bundle at build
        # time. They must NEVER be a Docker-internal hostname (e.g. media:5000) —
        # a browser cannot resolve that, which is what produced "Cannot reach the
        # media server". We leave them EMPTY so the browser uses same-origin:
        # every /api, /socket.io/ and /rtc/ request rides the page's own origin
        # and nginx routes it. SSR (inside the container) uses the *_INTERNAL_URL
        # runtime env below instead. This is the Google-Meet model: the
        # participant only ever knows the one URL they opened.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-}
        # Empty = same-origin (/rtc/ via nginx) — the correct architecture. The
        # direct-:5000 bypass was tried and made no difference (the failure was
        # client-side "forced close", not the proxy), so we keep same-origin.
        NEXT_PUBLIC_MEDIA_WS_URL: ${NEXT_PUBLIC_MEDIA_WS_URL:-}
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      # Next.js standalone reads HOSTNAME to decide what interface to bind to.
      # Docker sets HOSTNAME to the container ID → resolves to the container
      # network IP only, so healthcheck curl http://localhost:3000 fails.
      # 0.0.0.0 makes it listen on all interfaces including loopback.
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
      # Same-origin rewrite targets (used by next.config rewrites at runtime), so
      # opening the app on :3000 directly also proxies /api, /socket.io, /sfu.
      BACKEND_INTERNAL_URL: http://backend:4000
      MEDIA_INTERNAL_URL: http://media:5000
    ports:
      - '3000:3000'

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - web
      - backend
      - media
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - '80:80'

  # ---- TURN relay (NAT traversal) ----
  # coturn relays WebRTC media for participants behind symmetric NAT / strict
  # firewalls — the same fallback Google Meet uses so calls connect from any
  # network. Disabled by default (TURN_URL empty); to enable, set in .env:
  #   TURN_URL=turn:<PUBLIC_IP>:3478
  #   TURN_REALM=<your-host>   TURN_USER=atom   TURN_PASS=<secret>
  # and ensure UDP/TCP 3478 + the relay range 49160-49200 are reachable.
  coturn:
    image: coturn/coturn:4.6-alpine
    restart: unless-stopped
    network_mode: host # TURN needs the host IP for relay candidates
    command: >-
      -n
      --fingerprint
      --lt-cred-mech
      --realm=${TURN_REALM:-atom.local}
      --user=${TURN_USER:-atom}:${TURN_PASS:-atom_turn_secret}
      --listening-port=3478
      --min-port=49160
      --max-port=49200
      --no-cli
      --no-tls
      --no-dtls
      ${MEDIA_ANNOUNCED_IP:+--external-ip=${MEDIA_ANNOUNCED_IP}}

  # ---- Observability ----
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    ports:
      - '${PROMETHEUS_PORT:-9090}:9090'

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - grafanadata:/var/lib/grafana
    ports:
      - '${GRAFANA_PORT:-3001}:3000'

  loki:
    image: grafana/loki:3.2.0
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./infra/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - lokidata:/loki
    ports:
      - '${LOKI_PORT:-3100}:3100'

  promtail:
    image: grafana/promtail:3.2.0
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./infra/loki/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    restart: unless-stopped
    command: ['--config=/etc/otel/config.yml']
    volumes:
      - ./infra/otel/otel-collector-config.yml:/etc/otel/config.yml:ro
    ports:
      - '4318:4318'
      - '4317:4317'

volumes:
  pgdata:
  redisdata:
  miniodata:
  promdata:
  grafanadata:
  lokidata:
